<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REMOTE_DEBUGGER // HACK_CLUB</title>
    <style>
        :root {
            --glow: #00ff41;
            --danger: #ff003c;
            --powerup: #ffea00;
        }

        body {
            margin: 0;
            background: #0a0a0a;
            color: var(--glow);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            border: 4px solid #111;
            box-sizing: border-box;
            transition: background 0.1s;
        }

        #player {
            position: absolute;
            width: 35px;
            height: 35px;
            background: var(--glow);
            left: 50px;
            top: 50%;
            box-shadow: 0 0 20px var(--glow);
            z-index: 10;
            transition: filter 0.2s;
        }

        .obstacle {
            position: absolute;
            width: 60px;
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        .powerup {
            position: absolute;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            filter: drop-shadow(0 0 10px var(--powerup));
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        .status-text {
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 5px #000;
        }

        #score-container {
            font-size: 0.9rem;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* The Spice: Shake Effect */
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-3px, -2px); }
            40% { transform: translate(3px, 2px); }
            60% { transform: translate(-3px, 1px); }
            80% { transform: translate(2px, -1px); }
            100% { transform: translate(0, 0); }
        }

        .shake { animation: shake 0.4s; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="player"></div>
    <div id="ui-layer">
        <div class="status-text" id="status">SYS_STATUS:
